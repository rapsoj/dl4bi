# https://github.com/YannDubs/Neural-Process-Family/blob/master/jupyter/reproducibility/ConvCNP.ipynb
cls: ConvCNP
kwargs:
  s_lower: [-2, -2]
  s_upper: [2, 2]
  points_per_unit: 7 # NOTE: points_per_unit * grid length should be equal to pixel num
  enc:
    cls: ConvDeepSet
    kwargs:
      d_out: 128
  conv_net:
    cls: ConvCNPNet
    kwargs:
      r_dim: 128
      kernel: [9, 9]
      num_blks: 5
  dec:
    cls: ConvDeepSet
    kwargs:
      d_out: 128
  head:
    cls: MLP
    kwargs:
      dims: [128, 128, 128, 2]
