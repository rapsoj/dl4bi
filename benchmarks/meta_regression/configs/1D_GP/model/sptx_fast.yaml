cls: SPTx
kwargs:
  embed_s:
    cls: LearnableEmbedding
    kwargs:
      map:
        cls: GaussianFourierEmbedding
        kwargs:
          embed_dim: 8
          var: 4.0
      post_process:
        cls: MLP
        kwargs:
          dims: [64, 64]
          act_fn: elu
  embed_s_f:
    cls: MLP
    kwargs:
      dims: [64]
      act_fn: elu
  dec:
    cls: KRStack
    kwargs:
      num_blks: 7
      skip_every_n: 2
      share_attn: True
      share_ffn: True
      attn: 
        cls: MultiheadFastAttention
        kwargs:
          build_phi:
            func: build_exp_phi
      ffn:
        cls: MLP
        kwargs:
          dims: [64, 64]
          act_fn: elu
  head:
    cls: MLP
    kwargs:
      dims: [64, 64, 2]
      act_fn: elu
