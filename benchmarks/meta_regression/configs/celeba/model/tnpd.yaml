cls: TNPD
kwargs:
  embed_s_f:
    cls: LearnableEmbedding
    kwargs:
      map:
        func: 'lambda x: x'
      post_process:
        cls: MLP
        kwargs:
          dims: [64, 64, 64, 64]
  enc:
    cls: TransformerEncoder
    kwargs:
      attn:
        cls: MultiheadAttention
      num_blks: 6
      d_ffn: 128
  head:
    cls: MLP
    kwargs:
      dims: [128, 2]
