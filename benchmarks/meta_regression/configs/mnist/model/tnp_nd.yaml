cls: TNPND
kwargs:
  min_std: 0.05
  embed_s_f:
    cls: MLP
    kwargs:
      dims: [64, 64, 64, 64]
  enc:
    cls: TransformerEncoder
    kwargs:
      num_blks: 6
      blk:
        cls: TransformerEncoderBlock
        kwargs:
          attn:
            cls: MultiHeadAttention
            kwargs:
              num_heads: 4
              p_dropout: 0.0
          ffn:
            cls: MLP
            kwargs:
              dims: [128, 64]
  dec_f_mu:
    cls: MLP
    kwargs:
      dims: [128, 1]
  dec_f_std:
    cls: TransformerEncoder
    kwargs:
      num_blks: 2
      blk:
        cls: TransformerEncoderBlock
        kwargs:
          attn:
            cls: MultiHeadAttention
            kwargs:
              num_heads: 4
              p_dropout: 0.0
          ffn:
            cls: MLP
            kwargs:
              dims: [128, 64]
          p_dropout: 0.0
  proj_f_std:
    cls: MLP
    kwargs:
      dims: [128, 128, 128, 20]
