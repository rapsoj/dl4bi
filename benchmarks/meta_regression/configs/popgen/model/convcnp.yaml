  points_per_unit: 128 # default in ConvCNP impl
  enc:
    cls: ConvDeepSet
    kwargs:
      d_out: 128
  conv_net:
    cls: ConvCNPNet
    kwargs:
      r_dim: 128
      kernel: [19]
      num_blks: 5
