cls: TNPKR
kwargs:
  num_blks: 6
  num_reps: 1
  embed_all:
    cls: MLP
    kwargs:
      dims: [256, 128, 64]
      act_fn: gelu
  dist: null
  bias: null
  blk:
    cls: KRBlock
    kwargs:
      attn:
        cls: DeepKernelAttention
        kwargs:
          num_heads: 1
          proj_qks:
            cls: MLP
            kwargs:
              dims: [128, 128]
              act_fn: gelu
          proj_vs:
            cls: MLP
            kwargs:
              dims: [128, 64]
              act_fn: gelu
      ffn:
        cls: MLP
        kwargs:
          dims: [256, 64]
          act_fn: gelu
  head:
    cls: MLP
    kwargs:
      dims: [256, 64, 2]
      act_fn: gelu
  output_fn:
    func: 'lambda x: diagonal_mvn(x, min_std=0.05)'
