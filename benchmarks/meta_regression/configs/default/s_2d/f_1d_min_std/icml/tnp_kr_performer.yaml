cls: TNPKR
kwargs:
  num_blks: 6
  num_reps: 1
  embed_all:
    cls: MLP
    kwargs:
      dims: [512, 128, 64]
      act_fn: gelu
  dist: null
  bias: null
  blk:
    cls: KRBlock
    kwargs:
      attn:
        cls: MultiHeadAttention
        kwargs:
          num_heads: 4
          attn:
            cls: FastAttention
            kwargs:
              num_ortho_features: 128
          proj_qs:
            cls: MLP
            kwargs:
              dims: [128]
          proj_ks:
            cls: MLP
            kwargs:
              dims: [128]
          proj_vs:
            cls: MLP
            kwargs:
              dims: [128]
          proj_out:
            cls: MLP
            kwargs:
              dims: [64]
      ffn:
        cls: MLP
        kwargs:
          dims: [256, 64]
          act_fn: gelu
  head:
    cls: MLP
    kwargs:
      dims: [256, 64, 2]
      act_fn: gelu
  output_fn:
    func: 'lambda x: diagonal_mvn(x, min_std=0.05)'
