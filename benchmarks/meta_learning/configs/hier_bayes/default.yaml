defaults:
  - _self_ # use default global values below
  - data: 1d
  - infer: 1d
  - model: 1d/tnp_kr
wandb: True
seed: 42
infer_seed: 42
infer_model: spatial
infer_compare: False
project: Hierarchical Bayes
train_num_steps: 1000000
valid_num_steps: 5000
valid_interval: 10000
plot_interval: 100000
optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 3.0
    - _target_: optax.yogi
      learning_rate:
        _target_: optax.cosine_decay_schedule
        init_value: 1.0e-3
        decay_steps: ${train_num_steps}
        alpha: 1.0e-4
