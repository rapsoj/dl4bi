defaults:
  - _self_ # use default global values below
  - model: bsa_tnp
seed: 42
wandb: True
project: Generic Spatial
train_num_steps: 100000
valid_num_steps: 5000
valid_interval: 10000
plot_interval: 50000
data:
  num_features: 10
  batch_size: 32
  num_ctx_min: 128 # ~12.5% of locations
  num_ctx_max: 256 # ~25% of locations
  num_test: 256 # ~25% of locations
  s:
  - start: -2
    stop: 2
    num: 32
  - start: -2
    stop: 2
    num: 32
mcmc:
  num_warmup: 1000
  num_samples: 1000
  num_chains: 4
infer_with_model: False
infer_with_mcmc: False
optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 1.0
    - _target_: optax.adamw
      learning_rate: 1.0e-4
      b1: 0.9
      b2: 0.999
      weight_decay: 1.0e-4
