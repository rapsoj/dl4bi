cls: CANP
kwargs:
  embed_s:
    cls: MLP
    kwargs:
      dims: [512, 128]
  enc_det:
    cls: MLP
    kwargs:
      dims: [512, 256, 128]
  self_attn_det:
    cls: MultiHeadAttention
    kwargs:
      num_heads: 8
      proj_qs:
        cls: MLP
        kwargs:
          dims: [128]
      proj_ks:
        cls: MLP
        kwargs:
          dims: [128]
      proj_vs:
        cls: MLP
        kwargs:
          dims: [128]
      proj_out:
        cls: MLP
        kwargs:
          dims: [128]
  cross_attn:
    cls: MultiHeadAttention
    kwargs:
      num_heads: 8
      proj_qs:
        cls: MLP
        kwargs:
          dims: [128]
      proj_ks:
        cls: MLP
        kwargs:
          dims: [128]
      proj_vs:
        cls: MLP
        kwargs:
          dims: [128]
      proj_out:
        cls: MLP
        kwargs:
          dims: [128]
  dec:
    cls: MLP
    kwargs:
      dims: [512, 128, 128, 128, 2]
  output_fn:
    func: 'lambda x: diagonal_mvn(x, min_std=0.05)'
