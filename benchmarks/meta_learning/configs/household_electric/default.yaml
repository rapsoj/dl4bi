defaults:
  - _self_ # use default global values below
  - model: bsa_tnp
seed: 42
wandb: True
project: Household Electric
train_num_steps: 100000
valid_num_steps: null # set to null if using full valid set
valid_interval: 10000
data:
  batch_size: 32
  num_ctx_min: 32
  num_ctx_max: 256
  num_test: 256
optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 1.0
    - _target_: optax.adamw
      learning_rate:
        _target_: optax.cosine_decay_schedule
        init_value: 2.0e-3
        decay_steps: ${train_num_steps}
        alpha: 2.0e-5
      b1: 0.9
      b2: 0.999
      weight_decay: 1.0e-4
