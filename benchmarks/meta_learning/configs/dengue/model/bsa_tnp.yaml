  num_ids: 24
  num_features: 16
  channel: 0
embed_all:
  _target_: dl4bi.mlp.MLP
  dims: [512, 256, 128, 64]
  act_fn:
    _target_: jax.nn.gelu
    _partial_: true
blk:
