name: reduced
splits:
  train_region: central_europe
  valid_region: northern_europe
  test_region: western_europe
train_dataloader:
  batch_size: 32
  num_ctx_min_per_t: 10  # ~5% of 196
  num_ctx_max_per_t: 50  # ~25% of 196
  num_test: 196  # 196 = 14 * 14 = predicted frame
  H_deg: 3.5 # 3.5 / 0.25 grid res = 14
  W_deg: 3.5 # 3.5 / 0.25 grid res = 14
  T_hrs: 30
  T_hrs_delta: 6
  num_batches_per_subset: 8 # 32 // 4
valid_dataloader:
  batch_size: 8
  num_ctx_min_per_t: 45  # ~5% of 900 = 30 * 30
  num_ctx_max_per_t: 225  # ~25% of 900 = 30 * 30
  num_test: 900  # 900 = 30 * 30 = predicted frame
  H_deg: 7.5
  W_deg: 7.5
  T_hrs: 30
  T_hrs_delta: 6
  num_batches_per_subset: 32
test_dataloader: ${.valid_dataloader}
