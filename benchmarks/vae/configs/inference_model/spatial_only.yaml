model: # Inference model function to choose from inference_models/inference_models.py
  func: noisy_spatial_model
spatial_prior:
  func: rbf
surrogate_model: True # Whether to use a surrogate model or and actual process sampling
num_obs_locations: null # Can be used to randomly select partial number of locations for inference
# priors names and args must be compat with Numpyro distributions
priors: # Priors for training DeepRV or for inference
  sigma:
    numpyro_dist: Uniform
    kwargs:
      low: 0.1
      high: 0.3
  var:
    numpyro_dist: Dirichlet
    kwargs:
      concentration: [1.0]
  ls:
    numpyro_dist: Uniform
    kwargs:
      low: 0.0
      high: 50.0
  period: # Would only be used if training prior is Periodic
    numpyro_dist: Uniform
    kwargs:
      low: 10.0
      high: 50.0
  # CAR model params, does not effect GP kernel runs and vice-versa. K = inverse(tau(D - alpha*A))
  tau: 
    numpyro_dist: Delta
    kwargs:
      v: 1.0
  alpha:
    numpyro_dist: Beta
    kwargs:
      concentration1: 4.0
      concentration0: 1.0
