[tool.poetry]
name = "dge"
version = "0.1.0"
description = "Deep Generative Emulation"
authors = ["Daniel Jenson <daniel.a.jenson@gmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
jaxlib = {version = "0.4.25+cuda12.cudnn89", extras = ["cuda12_pip"], source = "jax-cuda-12"}
jax = {version = "0.4.25"}
flax = "^0.8.0"
optax = "^0.2.1"
tqdm = "^4.66.2"
clu = "^0.0.11"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.4"

[[tool.poetry.source]]
name = "jax-cuda-12"
url = "https://storage.googleapis.com/jax-releases/jax_cuda_releases.html"
priority = "explicit"

[[tool.poetry.source]]
name = "PyPI"
priority = "default"

[tool.ruff.lint]
extend-select = ["I"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
