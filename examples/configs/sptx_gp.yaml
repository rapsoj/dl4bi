data:
  grid:
    - start: 0.0
      stop: 1.0
      num: 128
  num_test: 16
  period: 0.2
  loader:
    obs_noise: 0.0
    min_p: 0.05
    max_p: 0.50
    batch_size: 64

infer:
  num_warmup: 500
  num_samples: 1000

train:
  num_batches: 100
  num_warmup: 1000
  learning_rate: 1.0e-3
  redraw_random_features_every_n: 10001

shared:
  pe_dim: 16
  embed_dim: 64

model:
  cls: SPTx
  kwargs:
    embed_s:
      cls: LearnableEmbedding
      kwargs:
        map:
          # func: 'lambda x: x' # only learned embeddings
          cls: GaussianFourierEmbedding
          kwargs:
            embed_dim: ${shared.pe_dim}
            var: 10.0
        post_process:
          cls: MLP
          kwargs:
            dims: ${eval:'[${shared.embed_dim}]*2'}
            p_dropout: 0.0
    embed_s_f:
      cls: MLP
      kwargs:
        dims: ${eval:'[${shared.embed_dim}]*1'}
        p_dropout: 0.0
    enc:
      cls: TransformerEncoder
      kwargs:
        attention:
          cls: MultiheadFastSoftmaxAttention
          # cls: MultiheadAttention
          kwargs:
            p_dropout: 0.0
        num_blks: 4
        p_dropout: 0.0
    dec:
      cls: TransformerDecoder
      kwargs:
        attention:
          cls: MultiheadFastSoftmaxAttention
          # cls: MultiheadAttention
          kwargs:
            p_dropout: 0.0
        num_blks: 1
        p_dropout: 0.0
    head:
      cls: MLP
      kwargs:
        dims: ${eval:'[${shared.embed_dim}]*3+[2]'}
        p_dropout: 0.0
